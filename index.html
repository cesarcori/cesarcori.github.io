<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--css-->
    <link rel="stylesheet" href="assets/css/styles.css" />

  <!-- Favicons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/icons/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/icons/favicon-32x32.png"
    />

    <!--title-->
    <title>Julio Cesar | Developer</title>
  </head>
  <body>
    <!--Navbar-->
    <nav>
      <h1>Julio Cesar</h1>
      <ul class="navigation">
        <li><a href="#about" class="nav-link">About</a></li>
        <li><a href="#skills" class="nav-link">Skills</a></li>
        <li><a href="#projects" class="nav-link">Projects</a></li>
        <li><a href="#contact" class="nav-link">Contact</a></li>
      </ul>
      <button class="burger-menu" id="burger-menu">
        <ion-icon class="bars" name="menu-outline"></ion-icon>
      </button>
    </nav> 

    <!--Hero Section-->
    <!--I wanted to change to "about section", but the hero section is a section -->
    <!--where you explain the main of your page. It's like a design pattern. -->
    <!--Maintain the hero section.-->
    <section class="hero" id="about">
      <!--The imagen is free from:-->
      <!--https://www.bistouille.fr/petit-prince-renard-svg-gratuit/-->
      <img
        src="https://www.bistouille.fr/wp-content/uploads/2021/10/Bistouille-Le-Petit-Prince-Gratuit.png"
        alt="jane-doe"
        loading="lazy"
        class="hero-img"
      />
      <div class="bio animate__animated animate__shakeX">
        <h2 class="bio-title">About Me</h2>
        <p class="bio-text">
          Hi! I'm Julio Cesar Cori Ochoa, a developer that improves his 
          skills. 
        </p>
      </div>
    </section>
    <!--More about me-->
    <section class="more-about">
      <h2>More About Me</h2>
      <p>
        Working within a team is my main goal.
      </p>
      <p>
        One of my favorite things to do is go out for a walk with my dogs.
      </p>
      <p>
        I like reading books.
      </p>
    </section>


    <!-- Website scripts -->
    <script src="assets/js/app.js"></script>

    <!-- Ion icons -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js">
    </script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js">
    </script>
  </body>
</html>
